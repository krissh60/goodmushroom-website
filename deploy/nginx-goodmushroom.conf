# /etc/nginx/sites-available/goodmushroom
# Fixes Lighthouse issues: HTTPS redirect, HSTS, CSP, COOP, X-Frame-Options,
# long cache lifetimes, gzip/brotli compression.
# Symlink into sites-enabled, then: sudo nginx -t && sudo systemctl reload nginx

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name goodmushroom.in www.goodmushroom.in;

    # Let certbot renew over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://goodmushroom.in$request_uri;
    }
}

# ---------- www -> apex redirect on HTTPS ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.goodmushroom.in;

    ssl_certificate     /etc/letsencrypt/live/goodmushroom.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goodmushroom.in/privkey.pem;

    return 301 https://goodmushroom.in$request_uri;
}

# ---------- Main site ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name goodmushroom.in;

    root /var/www/goodmushroom;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/goodmushroom.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goodmushroom.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---------- Security headers (Lighthouse Best Practices) ----------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # CSP: allow Pexels CDN for product/hero imagery and Google Fonts for typography.
    # `form-action` allows our PHP endpoint and mailto fallback.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://images.pexels.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' mailto:" always;

    # ---------- Compression ----------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

    # Brotli (if module is installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # ---------- Cache: long-lived for static assets ----------
    location ~* \.(?:css|js|jpg|jpeg|png|webp|avif|svg|ico|woff2?|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-declare security headers (add_header resets inside location)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # HTML: short cache, must revalidate (so content updates ship fast)
    location ~* \.html$ {
        expires 10m;
        add_header Cache-Control "public, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # ---------- API (contact form backend) ----------
    # Block direct access to .env, logs, vendored lib (defense in depth)
    location ~ ^/api/(?:\.env|logs|lib)(?:/|$) { deny all; return 404; }

    location /api/ {
        # Pass /api/contact.php to PHP-FPM. Other files in /api/ are served as-is or 404.
        location ~ ^/api/.+\.php$ {
            include snippets/fastcgi-php.conf;
            # Adjust socket path to match installed php-fpm version
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_read_timeout 30s;
        }
        try_files $uri =404;
    }

    # Pretty URLs: /about -> /about.html, /products/cordyceps -> /products/cordyceps.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Deny hidden files (.env, .git, etc)
    location ~ /\. { deny all; }
}
